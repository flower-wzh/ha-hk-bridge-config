<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HomeKit Bridge 配置器</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <!-- 顶部 -->
  <header class="topbar">
    <div class="topbar-left">
      <span class="brand-icon">🌉</span>
      <h1>HomeKit Bridge 配置器</h1>
    </div>
    <div class="topbar-right">
      <span class="status-pill" id="stat-yaml">检查中…</span>
      <span class="status-pill" id="stat-token">—</span>
      <button class="btn-icon" id="btn-reload-bridges" title="重新加载 6 bridge">↻</button>
      <button class="btn-icon" id="btn-backups" title="备份列表">📦</button>
      <button class="btn-icon" id="btn-categories" title="分类管理">⚙️</button>
    </div>
  </header>

  <!-- 主体三栏 -->
  <main class="layout">
    <!-- 左侧: 区域/设备树 -->
    <aside class="sidebar">
      <div class="sidebar-head">
        <h2>设备</h2>
        <div class="tree-stats" id="tree-stats">加载中…</div>
      </div>
      <div class="tree-search">
        <input type="search" id="tree-search" placeholder="搜索设备或实体…">
      </div>
      <div class="tree" id="device-tree"></div>
    </aside>

    <!-- 中间: 实体卡片 + 分类分桶 -->
    <section class="content">
      <div class="content-toolbar">
        <div class="toolbar-left">
          <input type="search" id="entity-search" placeholder="🔍 搜索 entity_id / 名字 / domain…">
          <select id="domain-filter">
            <option value="">全部 domain</option>
          </select>
          <select id="bucket-filter">
            <option value="">全部分类</option>
          </select>
        </div>
        <div class="toolbar-right">
          <span class="hint" id="selection-count">已选 0</span>
          <button class="btn-ghost" id="btn-select-all-visible">全选可见</button>
          <button class="btn-ghost" id="btn-clear-selection">清空</button>
        </div>
      </div>

      <div class="buckets" id="buckets-container">
        <!-- 动态生成分类桶,每个桶是一个卡片组 -->
      </div>
    </section>
  </main>

  <!-- 底部保存条 -->
  <footer class="footer-bar" id="footer-bar">
    <div class="footer-info">
      <span id="dirty-info">无修改</span>
    </div>
    <div class="footer-actions">
      <button class="btn-secondary" id="btn-auto-assign">🎯 自动归类</button>
      <button class="btn-secondary" id="btn-preview">👁 预览 Diff</button>
      <button class="btn-primary" id="btn-save">💾 保存 + Reload</button>
    </div>
  </footer>

  <!-- 分类管理抽屉 -->
  <div class="drawer" id="categories-drawer" style="display:none">
    <div class="drawer-mask" data-close-drawer="categories-drawer"></div>
    <div class="drawer-panel">
      <div class="drawer-head">
        <h2>分类管理</h2>
        <button class="close" data-close-drawer="categories-drawer">×</button>
      </div>
      <div class="drawer-body">
        <p class="hint">拖拽调整分类顺序。规则按顺序匹配,第一个命中的分类胜出。</p>
        <div class="cat-list" id="categories-list"></div>
        <button class="btn-ghost" id="btn-add-category">+ 新增分类</button>
        <button class="btn-ghost" id="btn-reset-defaults">🔄 重置为默认 6 分类</button>
      </div>
      <div class="drawer-foot">
        <button class="btn-secondary" data-close-drawer="categories-drawer">取消</button>
        <button class="btn-primary" id="btn-save-categories">💾 保存分类</button>
      </div>
    </div>
  </div>

  <!-- 预览 diff 模态 -->
  <div class="modal" id="preview-modal" style="display:none">
    <div class="modal-mask" data-close-modal="preview-modal"></div>
    <div class="modal-box">
      <div class="modal-head">
        <h3>预览变更</h3>
        <button class="close" data-close-modal="preview-modal">×</button>
      </div>
      <div class="modal-body" id="preview-body"></div>
      <div class="modal-foot">
        <button class="btn-secondary" data-close-modal="preview-modal">关闭</button>
        <button class="btn-primary" id="btn-save-from-preview">💾 确认保存</button>
      </div>
    </div>
  </div>

  <!-- 备份列表模态 -->
  <div class="modal" id="backups-modal" style="display:none">
    <div class="modal-mask" data-close-modal="backups-modal"></div>
    <div class="modal-box">
      <div class="modal-head">
        <h3>备份列表</h3>
        <button class="close" data-close-modal="backups-modal">×</button>
      </div>
      <div class="modal-body" id="backups-body"></div>
      <div class="modal-foot">
        <button class="btn-secondary" data-close-modal="backups-modal">关闭</button>
      </div>
    </div>
  </div>

  <!-- Toast 容器 -->
  <div id="toast"></div>

  <script src="{{ url_for('static', filename='app.js') }}"></script>
</body>
</html>
