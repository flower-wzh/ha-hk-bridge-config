name: HomeKit Bridge 配置器
version: 1.0.0
slug: hk_bridge_config
description: 可视化调整 HA 的 HomeKit Bridge 配置(entity 进/出 + 中文名编辑 + 自动 reload)
url: https://github.com/flower-wzh/ha-hk-bridge-config
arch:
  - aarch64
  - amd64
  - armv7
  - armhf
  - i386
init: false
startup: services
boot: auto
hassio_api: true
homeassistant_api: true
ingress: true
ingress_port: 8099
panel_icon: mdi:bridge
panel_title: HK Bridges
panel_admin: true
map:
  - homeassistant_config:rw
ports: {}
options:
  yaml_path: /config/homekit_bridges.yaml
schema:
  yaml_path: str
